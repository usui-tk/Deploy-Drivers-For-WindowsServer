name: 📖 Documentation issue
description: Report a documentation problem (README / SPEC / TESTING / CONTRIBUTING — English or Japanese)
title: "[Docs] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the documentation! Please describe the problem precisely so the maintainer can fix it.

        **Reminder**: the documentation is bilingual (English / Japanese mirrors). Per [`SPEC.md`](../blob/main/SPEC.md) §A.12, English and Japanese versions must be kept in sync. If you report a problem in one language, the maintainer will fix both.

  - type: dropdown
    id: file
    attributes:
      label: Which document?
      options:
        - "README.md"
        - "README.ja.md"
        - "SPEC.md"
        - "SPEC.ja.md"
        - "TESTING.md"
        - "TESTING.ja.md"
        - "CONTRIBUTING.md"
        - "CODE_OF_CONDUCT.md"
        - "SECURITY.md"
        - "Multiple (describe below)"
    validations:
      required: true

  - type: input
    id: section
    attributes:
      label: Section / line reference
      description: Section heading or line number where the problem occurs.
      placeholder: "SPEC.md §A.4 Phase Architecture (line ~230)"
    validations:
      required: true

  - type: dropdown
    id: problem_type
    attributes:
      label: Problem type
      options:
        - "Factual error (statement is wrong)"
        - "Broken anchor / cross-reference link"
        - "Outdated information (was correct, no longer is)"
        - "Inconsistency between English / Japanese versions"
        - "Missing information (something should be documented but isn't)"
        - "Ambiguity / unclear wording"
        - "Typo / grammar"
        - "Other (describe below)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Quote the relevant passage and describe the problem.
      placeholder: |
        Example: 'In SPEC.md §B.3, the table says NPU codename `STX` corresponds to PCI HWID `PCI\VEN_1022&DEV_17F0`, but according to AMD release notes 1.6.1 (page 7), Strix Point uses `DEV_17F7`. The `Get-NpuPlatformDetail` helper should be updated.'
    validations:
      required: true

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix (optional)
      description: If you have a concrete fix in mind, describe it here. PRs welcome too.
